name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install npm dependencies
        run: npm ci

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            flatpak flatpak-builder

      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Write version to configs
        run: |
          VERSION="${{ env.VERSION }}"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            cfg.version = process.env.VERSION;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2)+'\n');
          "
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Configure GPG for CI
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf "pinentry-mode loopback\nno-tty\nbatch\n" > ~/.gnupg/gpg.conf
          printf "allow-loopback-pinentry\n" > ~/.gnupg/gpg-agent.conf
          gpgconf --reload gpg-agent || true
          echo "GPG_TTY=/dev/null" >> $GITHUB_ENV

      - name: Import signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | gpg --batch --import
            echo "KEY_IMPORTED=true" >> $GITHUB_ENV
          fi

      - name: Build deb + AppImage
        run: npm run tauri build -- --bundles deb,appimage

      - name: Sign deb packages
        if: env.KEY_IMPORTED == 'true'
        run: |
          for deb in src-tauri/target/release/bundle/deb/*.deb; do
            gpg --detach-sign --armor "$deb"
          done

      - name: Sign AppImage
        if: env.KEY_IMPORTED == 'true'
        run: |
          for app in src-tauri/target/release/bundle/appimage/*.AppImage; do
            gpg --batch --pinentry-mode loopback --detach-sign --armor "$app"
          done

      - name: Set up Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME runtime
        run: |
          flatpak install --user -y --noninteractive \
            org.gnome.Platform//47 org.gnome.Sdk//47 2>&1 | tail -5 || true

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --user \
            --repo=flatpak-repo \
            build-aux/flatpak/build-dir \
            build-aux/flatpak/com.writenostr.desktop.yml

      - name: Bundle Flatpak
        if: env.KEY_IMPORTED == 'true'
        run: |
          KEY_ID=$(gpg --batch --list-keys --with-colons lostcause@3nostr.com | awk -F: '/^fpr:/{print $10; exit}')
          flatpak build-bundle \
            --gpg-sign="$KEY_ID" \
            flatpak-repo \
            write-nostr.flatpak \
            com.writenostr.desktop

      - name: Bundle Flatpak (unsigned)
        if: env.KEY_IMPORTED != 'true'
        run: |
          flatpak build-bundle \
            flatpak-repo \
            write-nostr.flatpak \
            com.writenostr.desktop

      - name: Export public key
        if: env.KEY_IMPORTED == 'true'
        run: |
          gpg --armor --export lostcause@3nostr.com > build-aux/signing-key.pub

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: write-nostr-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.asc
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.asc
            write-nostr.flatpak
            build-aux/signing-key.pub

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.asc
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.asc
            write-nostr.flatpak
            build-aux/signing-key.pub
          generate_release_notes: true

      - name: Flathub PR
        env:
          FLATHUB_PAT: ${{ secrets.FLATHUB_PAT }}
        run: |
          if [ -z "$FLATHUB_PAT" ]; then
            echo "FLATHUB_PAT not set — skipping Flathub PR"
            exit 0
          fi

          REPO="flathub/com.writenostr.desktop"
          VERSION="${{ env.VERSION }}"
          BRANCH="update-v${VERSION}"

          git clone "https://x-access-token:${FLATHUB_PAT}@github.com/${REPO}.git" /tmp/flathub-repo
          cd /tmp/flathub-repo

          ARCHIVE_URL="https://github.com/imattau/write_nostr/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$ARCHIVE_URL" | sha256sum | cut -d' ' -f1)

          node -e "
            const fs = require('fs');
            let yml = fs.readFileSync('com.writenostr.desktop.yml', 'utf8');
            yml = yml.replace(/version: '.*?'/, \"version: '$VERSION'\");
            yml = yml.replace(/url: .*write_nostr\\/archive.*/, \"url: $ARCHIVE_URL\");
            yml = yml.replace(/sha256: .*/, \"sha256: $SHA256\");
            fs.writeFileSync('com.writenostr.desktop.yml', yml);
          "

          git config user.name "write_nostr Release Bot"
          git config user.email "lostcause@3nostr.com"
          git checkout -b "$BRANCH"
          git add -A
          git diff --quiet && git diff --staged --quiet && echo "No changes — skipping PR" && exit 0
          git commit -m "Update to v${VERSION}"
          git push origin "$BRANCH"

          curl -s -X POST \
            -H "Authorization: token ${FLATHUB_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/pulls" \
            -d "{\"title\":\"Update to v${VERSION}\",\"head\":\"${BRANCH}\",\"base\":\"master\",\"body\":\"Automated update for [v${VERSION}](https://github.com/imattau/write_nostr/releases/tag/v${VERSION}).\"}"
